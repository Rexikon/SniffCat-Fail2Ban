# SniffCat fail2ban Action
# Reports banned IPs to the SniffCat threat intelligence API
#
# https://github.com/Rexikon/SniffCat-fail2ban
# SPDX-License-Identifier: GPL-3.0-or-later
#
# Install to: /etc/fail2ban/action.d/sniffcat.conf

[Definition]

actionstart =
actionstop =
actioncheck =

actionban = /opt/sniffcat/fail2ban.sh <ip> <name> <failures>

actionunban =
